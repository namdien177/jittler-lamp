name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag format
        id: version
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a stable semantic version tag like v1.2.3, received ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Enforce tag on main HEAD
        shell: bash
        run: |
          git fetch origin main --depth=1
          MAIN_SHA="$(git rev-parse origin/main)"

          if [[ "${GITHUB_SHA}" != "${MAIN_SHA}" ]]; then
            echo "Release tags must point at the current main HEAD." >&2
            echo "tag sha:  ${GITHUB_SHA}" >&2
            echo "main sha: ${MAIN_SHA}" >&2
            exit 1
          fi

      - name: Check version sync against tag
        run: bun run release:check-version "${{ github.ref_name }}"

      - name: Typecheck workspace
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build workspace
        run: bun run build

  build-extension:
    needs: validate-tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension bundle
        run: bun run build:shared && bun run build:extension

      - name: Package extension release asset
        run: bun run release:package-extension "${{ needs.validate-tag.outputs.version }}"

      - name: Upload extension asset
        uses: actions/upload-artifact@v4
        with:
          name: release-extension
          path: release-artifacts/*.zip

  build-desktop:
    needs: validate-tag
    runs-on: macos-14
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine signing mode
        id: signing
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          if [[ -n "$CSC_LINK" && -n "$CSC_KEY_PASSWORD" ]] && [[ ( -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ) || ( -n "$APPLE_API_KEY" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" ) ]]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package macOS desktop release
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          JITTLE_LAMP_API_ORIGIN: ${{ secrets.JITTLE_LAMP_API_ORIGIN }}
          JITTLE_LAMP_WEB_ORIGIN: ${{ secrets.JITTLE_LAMP_WEB_ORIGIN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.signing.outputs.signed == 'true' && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: bun run --cwd apps/desktop package:ci

      - name: Verify macOS app code signature
        shell: bash
        run: |
          set -euo pipefail

          apps=()
          while IFS= read -r app; do
            apps+=("$app")
          done < <(find apps/desktop/artifacts -name "Jittle Lamp.app" -type d)
          if [[ ${#apps[@]} -ne 1 ]]; then
            echo "Expected exactly one packaged macOS app bundle, found ${#apps[@]}"
            find apps/desktop/artifacts -maxdepth 3 -type d -name "*.app" -print
            exit 1
          fi

          app_bundle="${apps[0]}"
          codesign --verify --deep --strict --verbose=2 "$app_bundle"
          signature_details="$(codesign -dv --verbose=4 "$app_bundle" 2>&1)"
          echo "$signature_details"

          if [[ "${{ steps.signing.outputs.signed }}" == "false" ]] && ! grep -q "Signature=adhoc" <<< "$signature_details"; then
            echo "Expected unsigned release fallback to use an ad-hoc macOS signature."
            exit 1
          fi

      - name: Collect macOS release artifact
        env:
          JL_MACOS_SIGNED: ${{ steps.signing.outputs.signed }}
        run: bun run release:collect-desktop "${{ needs.validate-tag.outputs.version }}"

      - name: Verify collected desktop artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(release-artifacts/jittle-lamp-desktop-v${{ needs.validate-tag.outputs.version }}-macos-arm64-*.dmg)
          if [[ ${#artifacts[@]} -ne 1 ]]; then
            echo "Expected exactly one collected desktop DMG, found ${#artifacts[@]}"
            ls -lah release-artifacts
            exit 1
          fi
          ls -lh "${artifacts[0]}"

      - name: Upload desktop asset
        uses: actions/upload-artifact@v4
        with:
          name: release-desktop
          path: release-artifacts/*
          if-no-files-found: error

  publish-release:
    needs:
      - build-extension
      - build-desktop
      - validate-tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" release-artifacts/* --title "${{ github.ref_name }}" --generate-notes

  publish-chrome-extension:
    needs:
      - build-extension
      - build-desktop
      - validate-tag
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download extension asset
        uses: actions/download-artifact@v4
        with:
          name: release-extension
          path: release-artifacts

      - name: Publish Chrome Web Store extension
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_PUBLISH_TYPE: ${{ secrets.CHROME_PUBLISH_TYPE || 'DEFAULT_PUBLISH' }}
          CHROME_DEPLOY_PERCENTAGE: ${{ secrets.CHROME_DEPLOY_PERCENTAGE }}
        run: bun run release:publish-chrome "release-artifacts/jittle-lamp-extension-v${{ needs.validate-tag.outputs.version }}.zip"
