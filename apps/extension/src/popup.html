<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jittle-lamp</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="hero">
        <p class="eyebrow">Local browser recorder</p>
        <div class="hero-row">
          <h1>jittle-lamp</h1>
          <span class="phase-pill" data-role="status-badge">idle</span>
        </div>
        <p class="summary" data-role="message-value"></p>
      </header>

      <section class="companion-strip">
        <div class="companion-copy">
          <p class="label">Desktop companion</p>
          <strong class="companion-title" data-role="companion-status">Checking…</strong>
          <p class="value mono wrap" data-role="companion-route">http://127.0.0.1:48115</p>
          <a
            class="companion-download"
            data-role="companion-download"
            href="https://github.com/namdien177/jittle-lamp"
            target="_blank"
            rel="noopener noreferrer"
            hidden
          >
            Download Companion App
          </a>
        </div>
        <span class="companion-pill" data-role="companion-pill" data-status="offline">offline</span>
      </section>

      <section class="details">
        <div class="detail-row">
          <span class="label">Session</span>
          <span class="value mono" data-role="session-value">—</span>
        </div>
        <div class="detail-row">
          <span class="label">Title</span>
          <span class="value" data-role="title-value">No session yet</span>
        </div>
        <div class="detail-row">
          <span class="label">URL</span>
          <span class="value mono wrap" data-role="url-value">Open an http(s) page to start recording.</span>
        </div>
        <div class="detail-row">
          <span class="label">Events</span>
          <span class="value" data-role="events-value">0</span>
        </div>
        <div class="detail-row">
          <span class="label">Artifacts</span>
          <span class="value mono wrap pre" data-role="artifact-value">—</span>
        </div>
      </section>

      <footer class="actions">
        <button class="button primary" data-role="start-button" type="button">
          <i data-lucide="play" aria-hidden="true"></i>
          <span>Start capture</span>
        </button>
        <button class="button secondary" data-role="stop-button" type="button">
          <i data-lucide="circle-stop" aria-hidden="true"></i>
          <span>Stop</span>
        </button>
      </footer>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
